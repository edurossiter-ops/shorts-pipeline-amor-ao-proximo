# Canal "Amor ao Próximo" — reflexões cristãs sobre dilemas do dia a dia.
#
# Fonte de tema: versículos bíblicos (arquivo local configs/versiculos.json).
# Formato editorial: REFLEXÃO cristã sobre dilemas da vida, NÃO história de personagem.
#
# Cálculo da duração:
#   450 palavras × (60s ÷ 150 palavras/min @ speed 1.20) ÷ aceleração 1.10
#   = ~164s de vídeo final (margem de 16s antes do limite de 180s/3min)

channel:
  name: "amor_ao_proximo"
  # youtube_channel_id opcional — quando não informado, usa o canal padrão da conta.
  # Como o token OAuth já está amarrado ao canal "Amor ao Próximo", pode deixar comentado.
  # youtube_channel_id: "UCxxxxxxxxxxxxxxxxxxxxx"

# --- Fonte de tema: versículos bíblicos ---
bible:
  versiculos_file: "configs/versiculos.json"
  # Lista de ganchos de abertura. O pipeline sorteia um por vídeo, evitando
  # repetir os usados nos últimos N (ver recent_hooks_avoid).
  # Estilos usados: A (mensagem direta), B (providência), C (pergunta reflexiva).
  ganchos:
    # Estilo A — Mensagem direta de Deus
    - "Deus tem uma mensagem pra você hoje..."
    - "Hoje Deus quer te dizer uma coisa importante..."
    # Estilo B — Providência / encontro não casual
    - "Talvez Deus tenha colocado este vídeo no seu caminho por um motivo..."
    - "Existe uma razão pra você estar ouvindo isso agora..."
    - "Esta reflexão talvez seja a resposta que você pediu em oração..."
    # Estilo C — Pergunta que provoca reflexão
    - "Você já se pegou pensando por que algumas dores não vão embora?"
    - "E se o que você está passando tivesse um propósito maior?"
    - "Quantas vezes você já pediu um sinal sem receber resposta?"
  recent_hooks_avoid: 5

# --- Geração da reflexão (Claude) ---
story:
  language: "Português Brasileiro"
  channel_identity: |
    Canal "Amor ao Próximo": reflexões cristãs sobre dilemas da vida real.
    Trata de situações que TODO MUNDO vive — família, trabalho, amizades, amor,
    perda, dúvida, medo, culpa, esperança — à luz da fé em Jesus Cristo.

    FORMATO: REFLEXÃO, NÃO HISTÓRIA.
    Não conte histórias ("uma mulher estava andando na rua...", "João trabalhava...").
    Fale DIRETAMENTE com a pessoa que está ouvindo, em segunda pessoa ("você").
    Aborde um DILEMA REAL que ela pode estar vivendo e mostre como o Evangelho
    oferece um caminho.

    Tom: profundidade espiritual + humanidade. Acolhedor, mas sem relativizar o
    pecado. Mostra Cristo como resposta, não como opção filosófica.
    Linguagem coloquial, emocional, próxima. NÃO doutrinária, NÃO panfletária,
    NÃO com jargão teológico. Mas também NÃO genérica — cristã de verdade.

  # Os "pillars" e "themes" aqui não são usados diretamente pela fonte bíblica,
  # mas ficam como referência editorial sobre o que o canal cobre.
  allowed_pillars:
    - reflexao_crista

  allowed_themes:
    - familia
    - trabalho
    - amizade
    - amor_e_fe
    - perda_e_luto
    - medo_ansiedade
    - perdao_reconciliacao
    - proposito_chamado
    - fe_no_cotidiano

  forbidden_topics:
    - Proselitismo agressivo ou ataques a outras religiões
    - Conteúdo sectário ou teologicamente polêmico (predestinação, denominações brigando)
    - Promessas de cura ou milagre vinculados a pagamento (teologia da prosperidade)
    - Suicídio, aborto, violência ou drogas como ato explícito (pode ser referência indireta)
    - Citação literal de versículos bíblicos (o versículo é seed INTERNO, nunca citado)
    - Nomes de pessoas reais, igrejas reais ou denominações específicas
    - Narrativa em terceira pessoa ("João pensou...", "Maria entrou...")

  duration_target_seconds: 180   # alvo da NARRAÇÃO crua (será acelerada em 1.10x)
  word_count_min: 420
  word_count_max: 480
  include_hook: true

  cta_text: "Se essa mensagem tocou seu coração, deixa um amém aqui embaixo e se inscreve no canal Amor ao Próximo pra mais reflexões que falam direto com a sua fé."

  extra_instructions: |
    REGRAS DURAS (siga à risca):
    - NUNCA cite o versículo literalmente. Ele é SEED INTERNO, sua bússola
      temática. A pessoa não precisa reconhecer que partiu de um versículo.

    GANCHO INICIAL (primeira frase, OBRIGATÓRIO):
    Use o gancho que foi sorteado no input da etapa (campo "gancho_escolhido").
    NÃO invente outro. NÃO modifique o gancho — use literal na primeira frase.

    ESTRUTURA DA REFLEXÃO (em 6 partes, fluindo natural):
    1. Gancho (primeira frase — o gancho sorteado)
    2. Nomear o dilema: uma pergunta ou situação que a pessoa já viveu
       (ex: "Quantas vezes você já perdoou alguém e se sentiu um idiota depois?")
    3. Desenvolver a dor/dúvida: validar o sentimento, mostrar que é universal
    4. Ancorar em Cristo: trazer a perspectiva de Jesus sobre isso (o que Ele
       ensinou, como Ele viveu, o que Ele prometeu). Use o versículo-seed como
       bússola temática, SEM citá-lo. Mencionar Jesus/Cristo explicitamente.
    5. Oração curta (4-6 linhas) falando com Deus EM NOME de quem ouve, tipo
       "Senhor, te agradeço por quem está ouvindo isso agora. Que você toque..."
    6. CTA final (use o cta_text como base, pode adaptar 1-2 palavras)

    PESSOA E VOZ:
    - Sempre em SEGUNDA PESSOA: "você", "pra você", "quantas vezes você..."
    - NUNCA em terceira pessoa ("havia uma mulher que...", "João sentia...")
    - NUNCA em primeira pessoa plural forçada ("nós todos sabemos...")
    - Fale DIRETO com a pessoa, como se estivesse ao lado dela

    TOM CRISTÃO EXPLÍCITO:
    - Mencionar Jesus/Cristo por nome, frequentemente
    - Usar "Deus", "Senhor", "Pai" naturalmente
    - A resposta é sempre Cristo — não apenas "positividade" ou "resiliência"
    - Evite virar autoajuda genérica

    PAUSAS E RITMO:
    - NUNCA use audio tags em colchetes (tipo [short pause], [pause], etc.)
      O modelo de voz LÊ LITERALMENTE o texto entre colchetes.
    - Use pontuação natural pra pausas: vírgula, ponto, travessão (—).
    - MAIÚSCULAS pontuais pra ênfase (máximo 2 vezes em toda a reflexão).

    LINGUAGEM:
    - Português Brasileiro coloquial, acessível, emocional.
    - Sem palavrão.
    - Sem jargão teológico (evite "graça santificante", "kenosis", "justificação",
      "santificação progressiva", etc.).
    - Sem "jargão evangélico genérico" ("Deus tem um propósito maior" dito seco
      como frase de bolacha). Sempre desenvolver a ideia.

  model: "claude-sonnet-4-20250514"
  max_tokens: 4000
  temperature: 0.85

# --- Narração (ElevenLabs) ---
narration:
  voice_id: "xsSg7GkDPDhaGZpbKOLn"
  model_id: "eleven_multilingual_v2"   # melhor pra português + speed do que eleven_v3
  speed: 1.20                           # máximo do ElevenLabs sem ficar robótico
  max_chars_per_call: 4999

# --- Seleção visual (Pexels) ---
visual:
  queries:
    # Cenas contemplativas, espirituais, naturais — combinam com tom reflexivo
    - "sunset clouds golden hour"
    - "praying hands close up"
    - "candle flame slow"
    - "open bible pages wind"
    - "church window light"
    - "mountain peaceful sunrise"
    - "ocean waves slow motion"
    - "forest light rays"
    - "field wheat golden"
    - "white dove flying slow"
    - "rosary beads close up"
    - "wooden cross silhouette"
    - "rain window reflection"
    - "person walking sunset silhouette"
    - "candle church interior"
  min_clip_seconds: 5
  max_clip_seconds: 15
  max_clips_per_query: 2
  max_pages_per_query: 5
  per_page: 40
  recent_backgrounds_limit: 5
  blocked_keywords:
    - sexy
    - sensual
    - erotic
    - bikini
    - lingerie
    - nude
    - alcohol
    - party
    - drugs
    - smoking
    - violence

# --- Montagem do vídeo (FFmpeg) ---
video:
  target_width: 1080
  target_height: 1920
  fps: 30
  final_speed_multiplier: 1.10   # leve aceleração pra garantir <3min
  font_name: "Georgia"            # fonte mais serena e clássica
  font_size: 76
  max_words_per_caption: 4        # legendas mais curtas, ritmo contemplativo
  whisper_model: "small"

# --- Publicação no YouTube ---
youtube:
  category_id: "22"        # People & Blogs (também serve "29" Nonprofits & Activism)
  privacy_status: "public"
  tags:
    - "fe"
    - "deus"
    - "jesus"
    - "cristao"
    - "evangelho"
    - "reflexao crista"
    - "amor ao proximo"
    - "shorts"
  made_for_kids: false
  default_language: "pt"
  default_audio_language: "pt"

# --- Retry ---
retry:
  max_attempts_per_step: 3
  initial_delay: 5.0
  max_delay: 60.0
  continue_on_step_failure: false
