# Canal "Amor ao Próximo" — orações guiadas sobre temas da vida cristã.
#
# Fonte de tema: versículos bíblicos (arquivo local configs/versiculos.json).
# Formato editorial: ORAÇÃO GUIADA — a pessoa ora junto com o vídeo.
# Público-alvo: 20-35 anos, neopentecostal, linguagem jovem e direta.

channel:
  name: "amor_ao_proximo"

# --- Fonte de tema: versículos bíblicos ---
bible:
  versiculos_file: "configs/versiculos.json"
  ganchos:
    # Categoria 1 — Convite à oração (sutil)
    - "Para tudo que você tá carregando. Respira. E ora comigo agora."
    - "Se você tá precisando de um encontro com Jesus, esse momento é seu."
    - "Deus está te chamando pra orar agora — não importa onde você tá."
    - "Fecha os olhos por um segundo. Jesus quer falar com você."
    - "Antes de continuar o seu dia, para e ora comigo."
    # Categoria 2 — Direto e neopentecostal
    - "Em nome de Jesus, vou orar sobre algo que você tá vivendo agora."
    - "Hoje o Espírito Santo me colocou uma oração no coração pra você."
    - "Você não tá aqui por acaso. Deus preparou essa oração pra você."
    - "Isso que você tá sentindo — Jesus quer tocar agora. Ora comigo."
    - "Não feche esse vídeo. Deus tem uma palavra pra você nessa oração."
  recent_hooks_avoid: 5

# --- Geração da oração (Claude) ---
story:
  language: "Português Brasileiro"
  channel_identity: |
    Canal "Amor ao Próximo" — orações guiadas pra jovens cristãos de 20 a 35 anos.
    O espectador ORA JUNTO com o vídeo. Não assiste — participa.

    PÚBLICO: jovem neopentecostal brasileiro. Acorda ansioso, vai pro trabalho
    com fone, luta com relacionamentos, sente que a fé tá fraca às vezes.
    Mas crê em Jesus de verdade e quer orar — só precisa de alguém pra guiar.

    FORMATO: ORAÇÃO GUIADA — primeira pessoa do plural ou convite direto.
    "Senhor, eu te peço...", "Pai, toca nessa pessoa...", "Jesus, declaro..."
    A pessoa que está ouvindo ORA JUNTO. Ela não é espectadora — é participante.
    É como se um amigo de fé estivesse orando ao lado dela.

    TOM: neopentecostal jovem, íntimo, com fogo e ternura ao mesmo tempo.
    Use "Jesus", "Pai", "Espírito Santo", "declarar", "ungir", "vitória".
    Energia de momento de oração num culto jovem — presente, real, emocional.

  allowed_pillars:
    - oracao_guiada

  allowed_themes:
    - familia
    - trabalho
    - amizade
    - amor_e_fe
    - perda_e_luto
    - medo_ansiedade
    - proposito_chamado
    - fe_no_cotidiano
    - identidade_em_cristo
    - relacionamentos_modernos

  forbidden_topics:
    - Proselitismo agressivo ou ataques a outras religiões
    - Teologia da prosperidade (promessas de cura vinculadas a pagamento)
    - Suicídio, aborto, violência ou drogas como ato explícito
    - Citação literal de versículos bíblicos (o versículo é seed INTERNO)
    - Nomes de pessoas reais, igrejas reais ou denominações específicas
    - Narrativa em terceira pessoa ("João pensou...", "Maria entrou...")
    - Linguagem clerical ou litúrgica católica

  duration_target_seconds: 180
  word_count_min: 370
  word_count_max: 450
  include_hook: true

  cta_text: "Essa oração foi inspirada em {versiculo_ref}. Se você crê em Jesus, escreve AMÉM aqui embaixo e compartilha — alguém que você ama precisa orar isso hoje."

  extra_instructions: |
    REGRAS:
    1. O VERSÍCULO DO INPUT determina o TEMA da oração. Trabalho → ora sobre trabalho.
       Família → ora sobre família. Identidade → ora sobre identidade. Não invente.
    2. Primeira frase: use LITERAL o "gancho_escolhido" do input.
    3. A oração é GUIADA — o espectador ora junto. Use "Senhor, eu te peço",
       "Pai, eu declaro", "Jesus, toca em mim agora", "Espírito Santo, vem".
    4. NUNCA cite o versículo no texto — ele aparece só no CTA final.
    5. NUNCA use tags em colchetes — o modelo de voz lê literalmente.
    6. Última frase: exatamente o CTA fornecido.

    ESTRUTURA DA ORAÇÃO (6 partes):
    1. GANCHO (primeira frase — literal do input)
       Convida a pessoa a parar e orar. Tom de presença.

    2. ABERTURA DA ORAÇÃO
       Começa a orar de verdade. "Pai, eu venho diante de ti..."
       Nomeia o tema específico do versículo.

    3. PRIMEIRA CTA PARTICIPATIVA (após ~80 palavras)
       Interrompe brevemente pra engajar: "Se você tá sentindo isso,
       escreve aqui: EU CREIO. Deus tá ouvindo você agora."
       Ou: "Diz comigo em voz alta: Eu confio em ti, Jesus."

    4. NÚCLEO DA ORAÇÃO
       O coração da oração — o pedido específico, a declaração de fé,
       a entrega. Tom mais intenso. Jesus presente e poderoso.

    5. SEGUNDA CTA PARTICIPATIVA (após ~200 palavras)
       Outro momento de engajamento: "Escreve AMÉM se você recebeu."
       Ou: "Compartilha com alguém que precisa dessa oração agora."

    6. ENCERRAMENTO + CTA FINAL
       Fecha a oração com gratidão e vitória. Depois o CTA exato fornecido.

    TOM NEOPENTECOSTAL (obrigatório):
    - Use "Jesus", "Pai", "Espírito Santo" por nome, frequentemente.
    - "Declaro", "decreto", "confesso", "recebo por fé" — linguagem de fé ativa.
    - Frases curtas. Máximo 15 palavras por frase.
    - Cada parágrafo máximo 3 frases.
    - Energia de culto jovem — não de missa.

    PROIBIDO: reflexão filosófica passiva, jargão teológico clerical,
    teologia da prosperidade, autoajuda sem Cristo, linguagem litúrgica católica,
    qualquer arco de culpa/punição/arrependimento como tema central.

  model: "claude-sonnet-4-20250514"
  max_tokens: 4000
  temperature: 0.85

# --- Narração (Google TTS) ---
narration:
  # Google TTS não usa voice_id/model_id como ElevenLabs
  # A configuração de voz está hardcoded em narration.py (pt-BR-Neural2-B)
  # Esses campos ficam aqui como referência mas não são usados pelo Google TTS
  voice_id: "pt-BR-Neural2-B"
  model_id: "google_tts_gemini"
  speed: 1.1
  max_chars_per_call: 4900

# --- Seleção visual (Pexels) ---
visual:
  queries:
    # Natureza impactante — universal, não denominacional
    - "mountain sunrise dramatic"
    - "ocean waves powerful slow motion"
    - "forest light rays morning"
    - "field golden hour wide"
    - "storm clouds breaking light"
    # Pessoas jovens e fé
    - "young person praying hands open"
    - "person arms open worship field"
    - "young woman eyes closed peaceful"
    - "group young people worship hands raised"
    - "person silhouette sunset arms open"
    # Luz e esperança
    - "light beam through clouds dramatic"
    - "sunrise horizon hope"
    - "golden light rays sky"
    - "sun breaking through dark clouds"
    - "city lights night reflection"
  min_clip_seconds: 5
  max_clip_seconds: 15
  max_clips_per_query: 2
  max_pages_per_query: 5
  per_page: 40
  recent_backgrounds_limit: 5
  blocked_keywords:
    - sexy
    - sensual
    - erotic
    - bikini
    - lingerie
    - nude
    - alcohol
    - party
    - drugs
    - smoking
    - violence
    - rosary
    - catholic
    - church interior
    - candle altar
    - cross gothic

# --- Montagem do vídeo (FFmpeg) ---
video:
  target_width: 1080
  target_height: 1920
  fps: 30
  final_speed_multiplier: 1.0
  font_name: "Montserrat"      # igual ao canal do vídeo — mais moderno
  font_size: 80                # ligeiramente maior
  max_words_per_caption: 4
  whisper_model: "small"
  # Efeitos nas imagens (igual ao método do vídeo de referência)
  clip_duration_seconds: 10    # cada clipe exatamente 10 segundos
  clip_speed: 0.7              # levemente mais lento (camuflagem + atmosfera)
  hflip: true                  # espelhar horizontalmente (camuflagem)
  vignette: true               # efeito aureola suave nas bordas

# --- Publicação no YouTube ---
youtube:
  category_id: "22"
  privacy_status: "public"
  tags:
    - "oracao"
    - "jesus"
    - "deus"
    - "oracao guiada"
    - "oracao do dia"
    - "neopentecostal"
    - "jovens cristãos"
    - "amor ao proximo"
    - "shorts"
  made_for_kids: false
  default_language: "pt"
  default_audio_language: "pt"

# --- Retry ---
retry:
  max_attempts_per_step: 3
  initial_delay: 5.0
  max_delay: 60.0
  continue_on_step_failure: false
