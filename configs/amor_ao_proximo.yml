# Canal "Amor ao Próximo" — reflexões cristãs sobre dilemas do dia a dia.
#
# Fonte de tema: versículos bíblicos (arquivo local configs/versiculos.json).
# Formato editorial: REFLEXÃO cristã sobre dilemas da vida, NÃO história de personagem.
#
# Cálculo da duração:
#   450 palavras × (60s ÷ 150 palavras/min @ speed 1.20) ÷ aceleração 1.10
#   = ~164s de vídeo final (margem de 16s antes do limite de 180s/3min)
 
channel:
  name: "amor_ao_proximo"
  # youtube_channel_id opcional — quando não informado, usa o canal padrão da conta.
  # Como o token OAuth já está amarrado ao canal "Amor ao Próximo", pode deixar comentado.
  # youtube_channel_id: "UCxxxxxxxxxxxxxxxxxxxxx"
 
# --- Fonte de tema: versículos bíblicos ---
bible:
  versiculos_file: "configs/versiculos.json"
  # Lista de ganchos de abertura — todos mencionam Deus ou Jesus explicitamente
  # pra sinalizar imediatamente que é conteúdo cristão.
  # Categoria 1 (sutis): curiosidade + Deus
  # Categoria 2 (diretos): cristão explícito desde a primeira frase
  ganchos:
    # Categoria 1 — Curiosidade + Deus (mais sutil)
    - "E se o que você está passando tivesse um propósito maior nas mãos de Deus?"
    - "Talvez Jesus tenha colocado este vídeo no seu caminho por um motivo..."
    - "Quantas vezes você já pediu um sinal a Deus sem receber resposta?"
    - "Existe uma razão pra você estar ouvindo isso agora — e Deus sabe qual é..."
    - "Esta reflexão talvez seja a resposta que você pediu em oração..."
    # Categoria 2 — Direto e cristão (explícito)
    - "Jesus tem algo pra te dizer sobre essa fase que você está vivendo..."
    - "Deus não desperdiça nenhuma dor na sua vida — e eu vou te mostrar por quê..."
    - "Você já se perguntou por que Deus permite que coisas difíceis aconteçam com quem Ele ama?"
    - "Hoje Deus quer te dizer uma coisa importante sobre o que você está vivendo..."
    - "Deus tem uma mensagem pra você hoje — e ela vai mudar como você vê essa situação..."
  recent_hooks_avoid: 5
 
# --- Geração da reflexão (Claude) ---
story:
  language: "Português Brasileiro"
  channel_identity: |
    Canal "Amor ao Próximo": reflexões cristãs sobre dilemas da vida real.
    Trata de situações que TODO MUNDO vive — família, trabalho, amizades, amor,
    perda, dúvida, medo, culpa, esperança — à luz da fé em Jesus Cristo.
 
    FORMATO: REFLEXÃO, NÃO HISTÓRIA.
    Não conte histórias ("uma mulher estava andando na rua...", "João trabalhava...").
    Fale DIRETAMENTE com a pessoa que está ouvindo, em segunda pessoa ("você").
    Aborde um DILEMA REAL que ela pode estar vivendo e mostre como o Evangelho
    oferece um caminho.
 
    Tom: profundidade espiritual + humanidade. Acolhedor, mas sem relativizar o
    pecado. Mostra Cristo como resposta, não como opção filosófica.
    Linguagem coloquial, emocional, próxima. NÃO doutrinária, NÃO panfletária,
    NÃO com jargão teológico. Mas também NÃO genérica — cristã de verdade.
 
  # Os "pillars" e "themes" aqui não são usados diretamente pela fonte bíblica,
  # mas ficam como referência editorial sobre o que o canal cobre.
  allowed_pillars:
    - reflexao_crista
 
  allowed_themes:
    - familia
    - trabalho
    - amizade
    - amor_e_fe
    - perda_e_luto
    - medo_ansiedade
    - perdao_reconciliacao
    - proposito_chamado
    - fe_no_cotidiano
 
  forbidden_topics:
    - Proselitismo agressivo ou ataques a outras religiões
    - Conteúdo sectário ou teologicamente polêmico (predestinação, denominações brigando)
    - Promessas de cura ou milagre vinculados a pagamento (teologia da prosperidade)
    - Suicídio, aborto, violência ou drogas como ato explícito (pode ser referência indireta)
    - Citação literal de versículos bíblicos (o versículo é seed INTERNO, nunca citado)
    - Nomes de pessoas reais, igrejas reais ou denominações específicas
    - Narrativa em terceira pessoa ("João pensou...", "Maria entrou...")
 
  duration_target_seconds: 180   # alvo da NARRAÇÃO crua (será acelerada em 1.10x)
  word_count_min: 420
  word_count_max: 450
  include_hook: true
 
  cta_text: "A reflexão de hoje foi inspirada em {versiculo_ref}. Se inscreve no canal Amor ao Próximo pro seu versículo diário."
 
  extra_instructions: |
    REGRAS:
    1. O VERSÍCULO DO INPUT determina o dilema. Trabalho → fale de trabalho.
       Família → família. Disciplina → disciplina. Não invente outro tema.
    2. Primeira frase: use LITERAL o "gancho_escolhido" do input.
    3. Fale em segunda pessoa ("você") diretamente com quem ouve.
    4. Mencione Jesus/Cristo explicitamente. A resposta é sempre Cristo.
    5. NUNCA cite o versículo no texto — ele aparece só no CTA final.
    6. NUNCA use tags em colchetes — o modelo de voz lê literalmente.
    7. Última frase: exatamente o CTA fornecido.
 
    ESTRUTURA:
    Gancho → Dilema específico do versículo → Desenvolver a dor →
    Perspectiva de Cristo → Oração (4-6 linhas) → CTA
 
    ARCOS NARRATIVOS PERMITIDOS (escolha um conforme o versículo):
    - Consolo: "você está sofrendo, Deus está com você"
    - Esperança: "sua situação vai mudar, Deus tem um plano"
    - Identidade: "você é filho de Deus, pare de se diminuir"
    - Chamado: "Deus te criou com um propósito, não desperdice"
    - Gratidão: "olha o que Deus já fez na sua vida"
    - Vitória: "em Cristo você já venceu, ande como vencedor"
 
    PROIBIDO: narrativa em terceira pessoa, jargão teológico,
    teologia da prosperidade, autoajuda genérica sem Cristo,
    qualquer arco de culpa/arrependimento/perdão.
 
  model: "claude-sonnet-4-20250514"
  max_tokens: 4000
  temperature: 0.85
 
# --- Narração (ElevenLabs) ---
narration:
  voice_id: "xsSg7GkDPDhaGZpbKOLn"
  model_id: "eleven_multilingual_v2"   # melhor pra português + speed do que eleven_v3
  speed: 1.20                           # máximo do ElevenLabs sem ficar robótico
  max_chars_per_call: 4999
 
# --- Seleção visual (Pexels) ---
visual:
  queries:
    # Cenas contemplativas, espirituais, naturais — combinam com tom reflexivo
    - "sunset clouds golden hour"
    - "praying hands close up"
    - "candle flame slow"
    - "open bible pages wind"
    - "church window light"
    - "mountain peaceful sunrise"
    - "ocean waves slow motion"
    - "forest light rays"
    - "field wheat golden"
    - "white dove flying slow"
    - "rosary beads close up"
    - "wooden cross silhouette"
    - "rain window reflection"
    - "person walking sunset silhouette"
    - "candle church interior"
  min_clip_seconds: 5
  max_clip_seconds: 15
  max_clips_per_query: 2
  max_pages_per_query: 5
  per_page: 40
  recent_backgrounds_limit: 5
  blocked_keywords:
    - sexy
    - sensual
    - erotic
    - bikini
    - lingerie
    - nude
    - alcohol
    - party
    - drugs
    - smoking
    - violence
 
# --- Montagem do vídeo (FFmpeg) ---
video:
  target_width: 1080
  target_height: 1920
  fps: 30
  final_speed_multiplier: 1.0    # sem aceleração — vídeo fica ~2min 20s com 420 palavras
  font_name: "Georgia"            # fonte mais serena e clássica
  font_size: 76
  max_words_per_caption: 4        # legendas mais curtas, ritmo contemplativo
  whisper_model: "small"
 
# --- Publicação no YouTube ---
youtube:
  category_id: "22"        # People & Blogs (também serve "29" Nonprofits & Activism)
  privacy_status: "public"
  tags:
    - "fe"
    - "deus"
    - "jesus"
    - "cristao"
    - "evangelho"
    - "reflexao crista"
    - "amor ao proximo"
    - "shorts"
  made_for_kids: false
  default_language: "pt"
  default_audio_language: "pt"
 
# --- Retry ---
retry:
  max_attempts_per_step: 3
  initial_delay: 5.0
  max_delay: 60.0
  continue_on_step_failure: false
