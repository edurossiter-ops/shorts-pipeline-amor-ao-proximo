name: Shorts Pipeline

# Executa o pipeline de geração de shorts em horários agendados.
# Canal: Amor ao Próximo
# Frequência: 3x/dia em dias úteis + 2x/dia no fim de semana
# Total: ~83 vídeos/mês (~1000 min) — confortável dentro dos 2000 min gratuitos
#
# IMPORTANTE: GitHub Actions usa SEMPRE UTC. Brasil = UTC-3 (sem horário de verão).
# Para converter de Brasília → UTC, sempre soma 3 horas.

on:
  # Trigger manual (botão "Run workflow" na interface do GitHub).
  # Útil para testar antes de o cron rodar automaticamente.
  workflow_dispatch:
    inputs:
      config:
        description: "Arquivo de config (ex: configs/amor_ao_proximo.yml)"
        required: true
        default: "configs/amor_ao_proximo.yml"

  schedule:
  # SEG-SEX: 05:30, 11:30, 17:30 Brasília = 08:30, 14:30, 20:30 UTC
  - cron: "30 8,14,20 * * 1-5"

  # SÁB e DOM: 06:00 e 18:00 Brasília = 09:00 e 21:00 UTC
  - cron: "0 9,21 * * 0,6"

jobs:
  run-pipeline:
    name: Amor ao Próximo
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip wheel
          # --only-binary força o pip a usar pacotes já compilados (.whl),
          # evitando compilação demorada de ctranslate2/onnxruntime.
          # --prefer-binary tenta binário mas aceita source se não houver binário.
          pip install --prefer-binary -r requirements.txt

      - name: Pre-download Whisper model
        run: |
          # Baixa o modelo Whisper antes do pipeline rodar, assim a gente
          # sabe logo se tiver problema e evita que cada execução precise
          # baixar 500MB no meio do pipeline.
          python -c "from faster_whisper import WhisperModel; WhisperModel('small', device='cpu', compute_type='int8')"

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_SECRETS_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          GOOGLE_TTS_API_KEY: ${{ secrets.GOOGLE_TTS_API_KEY }}
        run: |
          CONFIG_FILE="${{ github.event.inputs.config || 'configs/amor_ao_proximo.yml' }}"
          python -m shorts_pipeline.orchestrator --config "$CONFIG_FILE" --base-dir data

      - name: Upload cycle artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cycle-${{ github.run_id }}
          path: data/**/pipeline_manifest.json
          retention-days: 30
