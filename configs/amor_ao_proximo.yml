# Canal "Amor ao Próximo" — reflexões cristãs sobre dilemas do dia a dia.
#
# Fonte de tema: versículos bíblicos (arquivo local configs/versiculos.json).
# Formato editorial: REFLEXÃO cristã sobre dilemas da vida, NÃO história de personagem.
# Público-alvo: 20-35 anos, neopentecostal, linguagem jovem e direta.

channel:
  name: "amor_ao_proximo"
  # youtube_channel_id opcional — quando não informado, usa o canal padrão da conta.
  # Como o token OAuth já está amarrado ao canal "Amor ao Próximo", pode deixar comentado.
  # youtube_channel_id: "UCxxxxxxxxxxxxxxxxxxxxx"

# --- Fonte de tema: versículos bíblicos ---
bible:
  versiculos_file: "configs/versiculos.json"
  # Lista de ganchos de abertura — todos mencionam Deus ou Jesus explicitamente
  # pra sinalizar imediatamente que é conteúdo cristão.
  # Categoria 1 (sutis): curiosidade + Deus
  # Categoria 2 (diretos): cristão explícito desde a primeira frase
  ganchos:
    # Categoria 1 — Curiosidade + Deus (mais sutil)
    - "E se o que você está passando tivesse um propósito maior nas mãos de Deus?"
    - "Talvez Jesus tenha colocado este vídeo no seu caminho por um motivo..."
    - "Quantas vezes você já pediu um sinal a Deus sem receber resposta?"
    - "Existe uma razão pra você estar ouvindo isso agora — e Deus sabe qual é..."
    - "Esta reflexão talvez seja a resposta que você pediu em oração..."
    # Categoria 2 — Direto e cristão (explícito)
    - "Jesus tem algo pra te dizer sobre essa fase que você está vivendo..."
    - "Deus não desperdiça nenhuma dor na sua vida — e eu vou te mostrar por quê..."
    - "Você já se perguntou por que Deus permite que coisas difíceis aconteçam com quem Ele ama?"
    - "Hoje Deus quer te dizer uma coisa importante sobre o que você está vivendo..."
    - "Deus tem uma mensagem pra você hoje — e ela vai mudar como você vê essa situação..."
  recent_hooks_avoid: 5

# --- Geração da reflexão (Claude) ---
story:
  language: "Português Brasileiro"
  channel_identity: |
    Canal "Amor ao Próximo" — reflexões cristãs pra quem tem entre 20 e 35 anos
    e vive a fé no dia a dia real: relacionamentos, trabalho, redes sociais,
    ansiedade, propósito, identidade, família, amizades que decepcionam.

    PÚBLICO: jovem adulto neopentecostal brasileiro. Alguém que ouve Elevation
    Worship no fone enquanto enfrenta segunda de manhã. Que luta com ansiedade
    mas crê que Jesus é a resposta. Que quer viver ungido mas se sente fraco.

    FORMATO: REFLEXÃO DIRETA, NÃO HISTÓRIA.
    Fale DIRETO com quem está ouvindo. Segunda pessoa sempre ("você", "te", "teu").
    Sem "havia uma vez", sem personagens, sem narrativa em terceira pessoa.
    Fale como alguém de 28 anos que conhece Jesus de verdade — não como pastor
    de terno lendo da Bíblia. Natural, real, com fogo.

    TOM: neopentecostal jovem. Use "Jesus", "Espírito Santo", "unção", "declarar",
    "vitória", "ativado", "a Palavra diz". Evite linguagem litúrgica ou clerical.
    Energia de culto jovem — não de missa. Intensidade de adoração — não de sermão.
    Acolhedor mas com convicção. Nunca relativiza a fé. Cristo é A resposta, não
    uma opção entre várias.

  allowed_pillars:
    - reflexao_crista

  allowed_themes:
    - familia
    - trabalho
    - amizade
    - amor_e_fe
    - perda_e_luto
    - medo_ansiedade
    - proposito_chamado
    - fe_no_cotidiano
    - identidade_em_cristo
    - relacionamentos_modernos

  forbidden_topics:
    - Proselitismo agressivo ou ataques a outras religiões
    - Conteúdo sectário ou teologicamente polêmico (predestinação, denominações brigando)
    - Promessas de cura ou milagre vinculados a pagamento (teologia da prosperidade)
    - Suicídio, aborto, violência ou drogas como ato explícito (pode ser referência indireta)
    - Citação literal de versículos bíblicos (o versículo é seed INTERNO, nunca citado)
    - Nomes de pessoas reais, igrejas reais ou denominações específicas
    - Narrativa em terceira pessoa ("João pensou...", "Maria entrou...")
    - Linguagem clerical ou litúrgica (evite "Senhor Todo-Poderoso", "Ó Pai Celestial")

  duration_target_seconds: 180
  word_count_min: 370
  word_count_max: 465
  include_hook: true

  cta_text: "A reflexão de hoje foi inspirada em {versiculo_ref}. Se você crê em Jesus, se inscreve agora e compartilha — alguém que você ama precisa ouvir isso hoje."

  extra_instructions: |
    REGRAS:
    1. O VERSÍCULO DO INPUT determina o dilema. Trabalho → fale de trabalho.
       Família → família. Disciplina → disciplina. Não invente outro tema.
    2. Primeira frase: use LITERAL o "gancho_escolhido" do input.
    3. Fale em segunda pessoa ("você") diretamente com quem ouve.
    4. Mencione Jesus/Cristo por nome, frequentemente e com fogo.
    5. NUNCA cite o versículo no texto — ele aparece só no CTA final.
    6. NUNCA use tags em colchetes — o modelo de voz lê literalmente.
    7. Última frase: exatamente o CTA fornecido.

    LINGUAGEM JOVEM (obrigatório):
    - Frases curtas. Máximo 15 palavras por frase.
    - Informal: "cara", "olha", "sabe", "tá", "tô", "pra" são ok.
    - Referências ao cotidiano moderno: ansiedade, redes sociais, comparação,
      pressão por performance, relacionamentos, FOMO, burnout, domingo à noite.
    - Ritmo acelerado. Sem enrolação. Sem preâmbulo.
    - Cada parágrafo máximo 3 frases.

    TOM NEOPENTECOSTAL COM FOGO (obrigatório desde o gancho):
    - PRIMEIRO PARÁGRAFO: já tem que soar neopentecostal — Jesus, Espírito Santo,
      fé, declaração, vitória. Não espere o meio do texto pra colocar o fogo.
    - Use "Jesus", "Espírito Santo", "unção", "declarar sobre a sua vida",
      "a Palavra diz", "ativado", "você foi criado pra mais".
    - Tom de culto jovem — não de missa. Intensidade de adoração.
    - A virada espiritual tem fogo e convicção — não gentileza pastoral tímida.

    GANCHOS INTERNOS (obrigatório — mínimo 2 ao longo do texto):
    Além do gancho inicial, insira pelo menos 2 perguntas ou frases de impacto
    no meio do texto pra manter o espectador preso:
    - "Mas sabe o que Jesus fez?" / "E sabe o que Deus diz sobre isso?"
    - "Você tá ouvindo isso?" / "Isso é pra você agora."
    - "Para. Respira. Olha pro que Jesus já fez."
    - Qualquer frase curta e direta que quebre o ritmo e prenda de volta.

    ESTRUTURA:
    Gancho (neopentecostal desde a primeira linha) →
    Dilema específico do versículo →
    Desenvolver a dor (com gancho interno) →
    Perspectiva de Cristo com fogo (com gancho interno) →
    Oração (4-6 linhas, íntima, direta com Jesus) →
    CTA com apelo de fé

    ARCOS NARRATIVOS PERMITIDOS (escolha um conforme o versículo):
    - Consolo: "você está sofrendo, Jesus está com você agora"
    - Esperança: "sua situação vai virar, Deus está trabalhando"
    - Identidade: "você é filho de Deus, para de andar como órfão"
    - Chamado: "você foi ungido com um propósito, não desperdice"
    - Gratidão: "abre os olhos pro que Jesus já fez na sua vida"
    - Vitória: "em Cristo você já venceu, anda como vencedor"

    PROIBIDO: narrativa em terceira pessoa, jargão teológico clerical,
    teologia da prosperidade, autoajuda genérica sem Cristo,
    qualquer arco de culpa/arrependimento/perdão,
    linguagem de missa ou liturgia católica.

  model: "claude-sonnet-4-20250514"
  max_tokens: 4000
  temperature: 0.85

# --- Narração (ElevenLabs) ---
narration:
  voice_id: "xsSg7GkDPDhaGZpbKOLn"
  model_id: "eleven_multilingual_v2"
  speed: 1.20
  max_chars_per_call: 4999

# --- Seleção visual (Pexels) ---
visual:
  queries:
    # Natureza impactante — universal, não denominacional
    - "mountain sunrise dramatic"
    - "ocean waves powerful slow motion"
    - "forest light rays morning"
    - "field golden hour wide"
    - "storm clouds breaking light"
    # Pessoas jovens e fé — neutro, abraça evangélicos e neopentecostais
    - "young person praying hands open"
    - "person arms open worship field"
    - "young woman eyes closed peaceful"
    - "group young people worship hands raised"
    - "person silhouette sunset arms open"
    # Luz e esperança — cinematográfico
    - "light beam through clouds dramatic"
    - "sunrise horizon hope"
    - "golden light rays sky"
    - "sun breaking through dark clouds"
    - "city lights night reflection"
  min_clip_seconds: 5
  max_clip_seconds: 15
  max_clips_per_query: 2
  max_pages_per_query: 5
  per_page: 40
  recent_backgrounds_limit: 5
  blocked_keywords:
    - sexy
    - sensual
    - erotic
    - bikini
    - lingerie
    - nude
    - alcohol
    - party
    - drugs
    - smoking
    - violence
    - rosary
    - catholic
    - church interior
    - candle altar
    - cross gothic

# --- Montagem do vídeo (FFmpeg) ---
video:
  target_width: 1080
  target_height: 1920
  fps: 30
  final_speed_multiplier: 1.0
  font_name: "Georgia"
  font_size: 76
  max_words_per_caption: 4
  whisper_model: "small"

# --- Publicação no YouTube ---
youtube:
  category_id: "22"
  privacy_status: "public"
  tags:
    - "fe"
    - "deus"
    - "jesus"
    - "cristao"
    - "evangelho"
    - "reflexao crista"
    - "amor ao proximo"
    - "neopentecostal"
    - "jovens cristãos"
    - "shorts"
  made_for_kids: false
  default_language: "pt"
  default_audio_language: "pt"

# --- Retry ---
retry:
  max_attempts_per_step: 3
  initial_delay: 5.0
  max_delay: 60.0
  continue_on_step_failure: false
